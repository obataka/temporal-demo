<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOP Workflow Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-3">
    <span class="text-xl font-semibold tracking-tight">SOP Workflow Dashboard</span>
    <span class="ml-auto text-xs text-gray-400">Temporal × Hono</span>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-10 space-y-8">

    <!-- ⓪ ワークフロー一覧 -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">ワークフロー一覧</h2>
        <button id="refreshListBtn" class="text-xs text-indigo-500 hover:text-indigo-700 transition font-medium">
          ↻ 更新
        </button>
      </div>
      <select
        id="workflowSelect"
        class="w-full rounded-lg border border-gray-300 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition bg-white"
      >
        <option value="">— 読み込み中 —</option>
      </select>
      <p class="mt-2 text-xs text-gray-400">選択すると自動で状態を取得します</p>
    </section>

    <!-- ① ワークフローID 入力エリア -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">ワークフロー ID</h2>
      <div class="flex gap-3">
        <input
          id="workflowIdInput"
          type="text"
          placeholder="例: sop-df8be811"
          class="flex-1 rounded-lg border border-gray-300 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
        />
        <button
          id="fetchStatusBtn"
          class="px-5 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 active:scale-95 transition"
        >
          状態を取得
        </button>
      </div>
    </section>

    <!-- ② 状況表示エリア -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-4">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">現在のステータス</h2>

      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-500">フェーズ:</span>
        <span id="statusBadge" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-600">
          —
        </span>
      </div>

      <div>
        <p class="text-sm text-gray-500 mb-2">SOP プレビュー</p>
        <pre
          id="sopPreview"
          class="bg-gray-50 border border-gray-200 rounded-lg p-4 text-xs text-gray-700 whitespace-pre-wrap break-words min-h-[120px] font-mono leading-relaxed"
        >ワークフロー ID を入力して「状態を取得」を押してください。</pre>
      </div>
    </section>

    <!-- ③ アクション（承認 / 差し戻し） -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">アクション</h2>
      <textarea
        id="feedbackInput"
        disabled
        placeholder="AIへの追加指示や修正要望をここに入力してください（差し戻し時に必須）"
        class="w-full rounded-lg border border-gray-200 px-4 py-3 text-sm bg-gray-50 text-gray-400 cursor-not-allowed resize-none focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition mb-4 min-h-[100px]"
      ></textarea>
      <div class="flex gap-3">
        <button
          id="approveBtn"
          disabled
          class="flex-1 py-3 rounded-lg bg-gray-300 text-gray-500 font-semibold text-sm cursor-not-allowed transition shadow-sm"
        >
          GitHub PR 作成を承認する
        </button>
        <button
          id="rejectBtn"
          disabled
          class="flex-1 py-3 rounded-lg bg-gray-300 text-gray-500 font-semibold text-sm cursor-not-allowed transition shadow-sm"
        >
          修正を指示して差し戻す
        </button>
      </div>
      <p class="mt-3 text-xs text-gray-400 text-center">承認すると approve_pr、差し戻すと reject_with_feedback シグナルが送信されます</p>
    </section>

    <!-- ④ AI エージェント思考ログ -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">AI エージェントの思考ログ</h2>
        <span id="agentLogsBadge" class="hidden text-xs px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-600 font-medium">更新中</span>
      </div>
      <!-- エージェントステータスバッジ -->
      <div class="flex gap-3 mb-3">
        <span id="badge-writer"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-mono bg-slate-800 text-slate-500 border border-slate-700 select-none">
          <span class="inline-block w-1.5 h-1.5 rounded-full bg-slate-600"></span>
          Writer
        </span>
        <span id="badge-reviewer"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-mono bg-slate-800 text-slate-500 border border-slate-700 select-none">
          <span class="inline-block w-1.5 h-1.5 rounded-full bg-slate-600"></span>
          Reviewer
        </span>
      </div>

      <div id="agentLogsContainer" class="bg-slate-900 rounded-lg p-4 max-h-60 overflow-y-auto">
        <p id="agentLogsPlaceholder" class="font-mono text-xs text-slate-500">現在、エージェントの思考ログはありません。</p>
        <pre id="agentLogsContent" class="hidden font-mono text-xs text-slate-200 whitespace-pre-wrap break-words leading-relaxed"></pre>
      </div>
    </section>

  </main>

  <!-- トースト通知コンテナ -->
  <div id="toastContainer" class="fixed bottom-6 right-6 flex flex-col gap-2 z-50"></div>

  <script>
    const workflowIdInput = document.getElementById('workflowIdInput');
    const fetchStatusBtn  = document.getElementById('fetchStatusBtn');
    const statusBadge     = document.getElementById('statusBadge');
    const sopPreview      = document.getElementById('sopPreview');
    const approveBtn      = document.getElementById('approveBtn');
    const rejectBtn       = document.getElementById('rejectBtn');
    const feedbackInput   = document.getElementById('feedbackInput');
    const toastContainer  = document.getElementById('toastContainer');
    const workflowSelect       = document.getElementById('workflowSelect');
    const refreshListBtn       = document.getElementById('refreshListBtn');
    const agentLogsContainer   = document.getElementById('agentLogsContainer');
    const agentLogsPlaceholder = document.getElementById('agentLogsPlaceholder');
    const agentLogsContent     = document.getElementById('agentLogsContent');
    const agentLogsBadge       = document.getElementById('agentLogsBadge');

    let currentWorkflowId = null;
    let pollingTimer      = null;
    let typingCursor      = null;

    const BADGE_STATES = {
      inactive: { badge: ['bg-slate-800',   'text-slate-500',  'border-slate-700'],  dot: ['bg-slate-600']                    },
      writer:   { badge: ['bg-emerald-950', 'text-emerald-400','border-emerald-500'], dot: ['bg-emerald-400', 'animate-pulse'] },
      reviewer: { badge: ['bg-amber-950',   'text-amber-400',  'border-amber-500'],   dot: ['bg-amber-400',   'animate-pulse'] },
    };

    // --- agentLogs 表示更新 ---
    function updateAgentLogs(logs) {
      if (!logs) {
        agentLogsPlaceholder.classList.remove('hidden');
        agentLogsContent.classList.add('hidden');
        agentLogsContent.textContent = '';
        return;
      }
      // 更新前に末尾付近（50px以内）か判定
      const isNearBottom =
        agentLogsContainer.scrollHeight - agentLogsContainer.scrollTop
        <= agentLogsContainer.clientHeight + 50;

      agentLogsPlaceholder.classList.add('hidden');
      agentLogsContent.classList.remove('hidden');
      agentLogsContent.textContent = logs;

      // 末尾付近にいた場合のみ自動スクロール（読み中は位置を維持）
      if (isNearBottom) {
        agentLogsContainer.scrollTop = agentLogsContainer.scrollHeight;
      }
    }

    // --- エージェントステータスバッジ切替 ---
    function updateAgentBadges(agent) {
      const writerEl    = document.getElementById('badge-writer');
      const reviewerEl  = document.getElementById('badge-reviewer');
      const writerDot   = writerEl.querySelector('span');
      const reviewerDot = reviewerEl.querySelector('span');
      const allBadge = Object.values(BADGE_STATES).flatMap(s => s.badge);
      const allDot   = Object.values(BADGE_STATES).flatMap(s => s.dot);

      writerEl.classList.remove(...allBadge);
      reviewerEl.classList.remove(...allBadge);
      writerDot.classList.remove(...allDot);
      reviewerDot.classList.remove(...allDot);

      const writerState   = agent === 'Writer'   ? BADGE_STATES.writer   : BADGE_STATES.inactive;
      const reviewerState = agent === 'Reviewer' ? BADGE_STATES.reviewer : BADGE_STATES.inactive;

      writerEl.classList.add(...writerState.badge);
      writerDot.classList.add(...writerState.dot);
      reviewerEl.classList.add(...reviewerState.badge);
      reviewerDot.classList.add(...reviewerState.dot);

      // タイピングカーソル制御
      if (agent !== null) {
        showTypingCursor();
      } else {
        hideTypingCursor();
      }
    }

    // --- タイピングカーソル ---
    function showTypingCursor() {
      if (typingCursor) return;
      agentLogsPlaceholder.classList.add('hidden');
      typingCursor = document.createElement('span');
      typingCursor.className = 'block font-mono text-xs text-slate-400 animate-pulse mt-1 select-none';
      typingCursor.textContent = '_';
      agentLogsContainer.appendChild(typingCursor);
      agentLogsContainer.scrollTop = agentLogsContainer.scrollHeight;
    }

    function hideTypingCursor() {
      if (!typingCursor) return;
      typingCursor.remove();
      typingCursor = null;
      if (agentLogsContent.classList.contains('hidden')) {
        agentLogsPlaceholder.classList.remove('hidden');
      }
    }

    // --- ポーリング制御 ---
    function startPolling() {
      if (pollingTimer) return;
      pollingTimer = setInterval(() => {
        if (currentWorkflowId) fetchStatus(true);
      }, 5000);
    }

    function stopPolling() {
      clearInterval(pollingTimer);
      pollingTimer = null;
      agentLogsBadge.classList.add('hidden');
    }

    // --- トースト通知 ---
    function showToast(message, type = 'success') {
      const colors = {
        success: 'bg-green-600 text-white',
        error:   'bg-red-600 text-white',
        warning: 'bg-yellow-500 text-white',
      };
      const toast = document.createElement('div');
      toast.className = `px-4 py-3 rounded-xl shadow-lg text-sm font-medium transition-opacity duration-300 ${colors[type] ?? colors.success}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // --- statusBadge の色切替 ---
    const BADGE_CLASSES = {
      awaiting: 'bg-yellow-100 text-yellow-700',
      done:     'bg-green-100 text-green-700',
      default:  'bg-indigo-100 text-indigo-700',
    };

    function applyBadgeStyle(phase, status) {
      const el = statusBadge;
      el.classList.remove(...Object.values(BADGE_CLASSES).flatMap(c => c.split(' ')));
      if (status === 'awaiting_pr_approval' || phase === 'awaiting_pr_approval') {
        el.classList.add(...BADGE_CLASSES.awaiting.split(' '));
      } else if (phase === 'completed') {
        el.classList.add(...BADGE_CLASSES.done.split(' '));
      } else {
        el.classList.add(...BADGE_CLASSES.default.split(' '));
      }
    }

    // --- 承認ボタンの有効/無効切替 ---
    function setApproveEnabled(enabled) {
      approveBtn.disabled = !enabled;
      if (enabled) {
        approveBtn.className = 'flex-1 py-3 rounded-lg bg-green-600 text-white font-semibold text-sm hover:bg-green-700 active:scale-95 transition shadow-sm cursor-pointer';
      } else {
        approveBtn.className = 'flex-1 py-3 rounded-lg bg-gray-300 text-gray-500 font-semibold text-sm cursor-not-allowed transition shadow-sm';
      }
    }

    // --- 差し戻しボタン・テキストエリアの有効/無効切替 ---
    function setRejectEnabled(enabled) {
      rejectBtn.disabled     = !enabled;
      feedbackInput.disabled = !enabled;
      if (enabled) {
        rejectBtn.className     = 'flex-1 py-3 rounded-lg bg-rose-500 text-white font-semibold text-sm hover:bg-rose-600 active:scale-95 transition shadow-sm cursor-pointer';
        feedbackInput.className = 'w-full rounded-lg border border-gray-300 px-4 py-3 text-sm bg-white text-gray-800 resize-none focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition mb-4 min-h-[100px]';
      } else {
        rejectBtn.className     = 'flex-1 py-3 rounded-lg bg-gray-300 text-gray-500 font-semibold text-sm cursor-not-allowed transition shadow-sm';
        feedbackInput.className = 'w-full rounded-lg border border-gray-200 px-4 py-3 text-sm bg-gray-50 text-gray-400 cursor-not-allowed resize-none focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition mb-4 min-h-[100px]';
      }
    }

    // --- 状態を取得 ---
    async function fetchStatus(silent = false) {
      const wfId = workflowIdInput.value.trim();
      if (!wfId) {
        if (!silent) showToast('ワークフロー ID を入力してください', 'warning');
        return;
      }

      currentWorkflowId = wfId;
      fetchStatusBtn.disabled = true;
      fetchStatusBtn.textContent = '取得中…';

      try {
        const res = await fetch(`/api/status/${encodeURIComponent(wfId)}`);
        const data = await res.json();

        if (res.status === 404) {
          showToast('ワークフローが見つかりません', 'error');
          return;
        }
        if (!res.ok) {
          showToast('サーバーエラーが発生しました', 'error');
          return;
        }

        // バッジ更新
        const label = data.phase_label ?? data.current_phase ?? '—';
        statusBadge.textContent = label;
        applyBadgeStyle(data.current_phase, data.status);

        // SOP プレビュー更新
        sopPreview.textContent = data.current_output
          ? data.current_output
          : '（SOP テキストはまだ生成されていません）';

        // agentLogs 更新（active_agent 実行中はステータスログを末尾に付加）
        const activeAgent    = data.active_agent ?? data.activeAgent ?? null;
        const agentLogs      = data.agentLogs ?? '';
        const agentStatusLog = data.agent_status_log ?? data.agentStatusLog ?? '';
        let displayLogs = agentLogs;
        if (activeAgent && agentStatusLog) {
          displayLogs = agentLogs
            ? `${agentLogs}\n\n---\n\n${agentStatusLog}`
            : agentStatusLog;
        }
        updateAgentLogs(displayLogs);
        updateAgentBadges(activeAgent);

        // 承認・差し戻しボタン制御
        const isAwaiting = data.status === 'awaiting_pr_approval';
        setApproveEnabled(isAwaiting);
        setRejectEnabled(isAwaiting);

        // ポーリング制御（完了・失敗時は停止、実行中は継続）
        if (data.status === 'completed' || data.current_phase === 'completed') {
          stopPolling();
        } else {
          startPolling();
        }

      } catch (err) {
        console.warn('[fetchStatus]', err);
        if (!silent) showToast('ネットワークエラーが発生しました', 'error');
      } finally {
        fetchStatusBtn.disabled = false;
        fetchStatusBtn.textContent = '状態を取得';
      }
    }

    // --- 承認送信 ---
    async function approveWorkflow() {
      if (!currentWorkflowId) return;

      approveBtn.disabled = true;
      approveBtn.textContent = '送信中…';

      try {
        const res = await fetch('/api/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ workflowId: currentWorkflowId }),
        });
        const data = await res.json();

        if (res.status === 404) {
          showToast('ワークフローが見つからないか、すでに完了しています', 'error');
          setApproveEnabled(true);
          return;
        }
        if (!res.ok) {
          showToast('承認送信に失敗しました', 'error');
          setApproveEnabled(true);
          return;
        }

        showToast('承認を送信しました', 'success');
        setApproveEnabled(false);
        setRejectEnabled(false);
        feedbackInput.value = '';
        statusBadge.textContent = '承認済み';
        applyBadgeStyle('completed', null);

      } catch (_) {
        showToast('ネットワークエラーが発生しました', 'error');
        setApproveEnabled(true);
      } finally {
        approveBtn.textContent = 'GitHub PR 作成を承認する';
      }
    }

    // --- ワークフロー一覧 ---
    const STATUS_BADGE = {
      RUNNING:          '🟡 実行中',
      COMPLETED:        '🟢 完了',
      FAILED:           '🔴 失敗',
      CANCELLED:        '⚪ キャンセル',
      TERMINATED:       '⛔ 強制終了',
      CONTINUED_AS_NEW: '🔄 継続',
      TIMED_OUT:        '🕐 タイムアウト',
    };

    async function loadWorkflowList() {
      workflowSelect.innerHTML = '<option value="">— 読み込み中 —</option>';
      try {
        const res  = await fetch('/api/workflows?limit=30');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error ?? 'error');

        workflowSelect.innerHTML = '<option value="">— ワークフローを選択 —</option>';
        data.forEach(wf => {
          const opt   = document.createElement('option');
          opt.value   = wf.workflowId;
          const label = STATUS_BADGE[wf.status] ?? wf.status;
          const date  = wf.startTime
            ? new Date(wf.startTime).toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
            : '';
          opt.textContent = `${wf.workflowId}  ${label}  ${date}`;
          workflowSelect.appendChild(opt);
        });
      } catch (_) {
        workflowSelect.innerHTML = '<option value="">— 取得失敗 —</option>';
        showToast('ワークフロー一覧の取得に失敗しました', 'error');
      }
    }

    workflowSelect.addEventListener('change', () => {
      const id = workflowSelect.value;
      if (!id) return;
      workflowIdInput.value = id;
      stopPolling();
      fetchStatus();
    });

    refreshListBtn.addEventListener('click', loadWorkflowList);
    window.addEventListener('load', loadWorkflowList);

    // --- 差し戻し送信 ---
    async function rejectWorkflow() {
      const comment = feedbackInput.value.trim();
      if (!comment) {
        showToast('修正指示を入力してください', 'warning');
        return;
      }
      if (!currentWorkflowId) return;

      rejectBtn.disabled = true;
      rejectBtn.textContent = '送信中…';

      try {
        const res = await fetch('/api/reject', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ workflowId: currentWorkflowId, feedbackComment: comment }),
        });

        if (res.status === 404) {
          showToast('ワークフローが見つからないか、すでに完了しています', 'error');
          setRejectEnabled(true);
          return;
        }
        if (!res.ok) {
          showToast('差し戻し送信に失敗しました', 'error');
          setRejectEnabled(true);
          return;
        }

        showToast('修正指示を送信しました', 'success');
        feedbackInput.value = '';
        setRejectEnabled(false);
        setApproveEnabled(false);
        statusBadge.textContent = '差し戻し済み';
        applyBadgeStyle('rejected', null);
        agentLogsBadge.classList.remove('hidden');

      } catch (_) {
        showToast('ネットワークエラーが発生しました', 'error');
        setRejectEnabled(true);
      } finally {
        rejectBtn.textContent = '修正を指示して差し戻す';
      }
    }

    fetchStatusBtn.addEventListener('click', fetchStatus);
    approveBtn.addEventListener('click', approveWorkflow);
    rejectBtn.addEventListener('click', rejectWorkflow);
  </script>

</body>
</html>
