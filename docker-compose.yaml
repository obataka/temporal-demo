version: "3.5"

services:
  postgresql:
    container_name: temporal-postgresql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgLocalDev_7f3a}
      POSTGRES_USER: temporal
    image: postgres:13
    networks:
      - temporal-network
    ports:
      - 5432:5432
    volumes:
      - /var/lib/postgresql/data

  temporal:
    container_name: temporal
    depends_on:
      - postgresql
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-pgLocalDev_7f3a}
      - POSTGRES_SEEDS=postgresql
    image: temporalio/auto-setup:1.26.2
    networks:
      - temporal-network
    ports:
      - 7233:7233

  temporal-ui:
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui:2.34.0
    networks:
      - temporal-network
    ports:
      - 8080:8080

  temporal-init:
    container_name: temporal-init
    image: temporalio/admin-tools:1.26.2
    depends_on:
      - temporal
    networks:
      - temporal-network
    entrypoint: >
      sh -c "
        echo 'Waiting for Temporal server...' &&
        until temporal operator search-attribute list --address temporal:7233 > /dev/null 2>&1; do
          sleep 2;
        done &&
        echo 'Registering Search Attributes...' &&
        temporal operator search-attribute create --address temporal:7233 --name LLM_Model --type Keyword || true &&
        temporal operator search-attribute create --address temporal:7233 --name Total_Tokens --type Int || true &&
        temporal operator search-attribute create --address temporal:7233 --name LLM_Status --type Keyword || true &&
        echo 'Search Attributes setup complete.'
      "
    restart: on-failure

  worker:
    container_name: temporal-worker
    build: .
    depends_on:
      - temporal
      - temporal-init
    environment:
      - TEMPORAL_HOST=temporal:7233
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEBUG_FAIL=${DEBUG_FAIL:-0}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    networks:
      - temporal-network
    ports:
      - 8000:8000
    restart: on-failure

  prometheus:
    container_name: temporal-prometheus
    image: prom/prometheus:v2.51.0
    depends_on:
      - worker
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - temporal-network
    ports:
      - 9090:9090

  grafana:
    container_name: temporal-grafana
    image: grafana/grafana:10.4.2
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-grafanaLocalDev_9c1e}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - temporal-network
    ports:
      - 3001:3000

  web-ui:
    container_name: temporal-web-ui
    build: ./web-ui
    env_file:
      - .env
    environment:
      - TEMPORAL_HOST=temporal:7233
    networks:
      - temporal-network
    ports:
      - 3000:3000
    restart: unless-stopped

networks:
  temporal-network:
    driver: bridge
    name: temporal-network
